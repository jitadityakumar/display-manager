<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }
  #error {
    display: none;
    position: fixed;
    inset: 0;
    background: #111;
    color: #ccc;
    font-family: monospace;
    font-size: 1.4rem;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #menu {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    color: #fff;
    font-family: sans-serif;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    z-index: 10;
  }
  #menu h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #aaa;
    margin-bottom: 1rem;
  }
  .menu-item {
    font-size: 2.6rem;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .menu-num {
    background: #333;
    color: #fff;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .menu-label {
    color: #eee;
  }
  #menu footer {
    margin-top: 2rem;
    font-size: 1rem;
    color: #555;
  }
</style>
</head>
<body>
<iframe id="frame" src="about:blank" allowfullscreen></iframe>
<div id="error">No URL configured.<br>Visit <strong>/admin</strong> to add one.</div>
<div id="menu">
  <h1>Select a display</h1>
  <div id="menu-list"></div>
  <footer>Enter to confirm &nbsp;·&nbsp; Backspace to return</footer>
</div>

<script>
  const frame = document.getElementById("frame");
  const errorEl = document.getElementById("error");
  const menuEl = document.getElementById("menu");
  const menuListEl = document.getElementById("menu-list");

  let urls = [];
  let allUrls = [];
  let cycleIndex = 0;
  let cycleTimer = null;
  let pollTimer = null;
  let currentInterval = 30;
  let currentMode = null;

  function showMenu(urlList) {
    menuListEl.innerHTML = urlList.map((u, i) =>
      `<div class="menu-item"><span class="menu-num">${i + 1}</span><span class="menu-label">${u.label}</span></div>`
    ).join("");
    menuEl.style.display = "flex";
  }

  function hideMenu() {
    menuEl.style.display = "none";
  }

  function showUrl(url) {
    if (!url) {
      frame.style.display = "none";
      errorEl.style.display = "flex";
      return;
    }
    errorEl.style.display = "none";
    frame.style.display = "block";
    if (frame.src !== url) frame.src = url;
  }

  function scheduleCycle() {
    cycleTimer = setTimeout(() => {
      cycleIndex = (cycleIndex + 1) % urls.length;
      showUrl(urls[cycleIndex]);
      scheduleCycle();
    }, currentInterval * 1000);
  }

  function applyConfig(cfg) {
    allUrls = cfg.urls || [];

    if (cfg.menu_active) {
      showMenu(allUrls);
      return;
    }
    hideMenu();

    if (cfg.mode === "single") {
      clearTimeout(cycleTimer);
      cycleTimer = null;
      currentMode = "single";
      showUrl(cfg.active_url ? cfg.active_url.url : null);
      return;
    }

    // cycle mode
    const newUrls = (cfg.urls || []).map(u => u.url);
    const urlsChanged = JSON.stringify(newUrls) !== JSON.stringify(urls);
    const intervalChanged = cfg.interval_secs !== currentInterval;

    urls = newUrls;
    currentInterval = cfg.interval_secs;

    if (urls.length === 0) {
      clearTimeout(cycleTimer);
      cycleTimer = null;
      currentMode = "cycle";
      showUrl(null);
      return;
    }

    // Only restart the cycle if something meaningful changed or we just entered cycle mode
    if (currentMode !== "cycle" || urlsChanged || intervalChanged) {
      clearTimeout(cycleTimer);
      if (urlsChanged) cycleIndex = 0;
      currentMode = "cycle";
      showUrl(urls[cycleIndex]);
      scheduleCycle();
    }
    // Otherwise let the existing timer run uninterrupted
  }

  function poll() {
    fetch("/api/config")
      .then(r => r.json())
      .then(cfg => {
        applyConfig(cfg);
        const delay = cfg.menu_active ? 1000 : Math.min(60, Math.max(10, cfg.interval_secs)) * 1000;
        pollTimer = setTimeout(poll, delay);
      })
      .catch(() => {
        pollTimer = setTimeout(poll, 15000);
      });
  }

  poll();
</script>
</body>
</html>
