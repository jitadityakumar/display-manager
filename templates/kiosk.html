<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }
  #error {
    display: none;
    position: fixed;
    inset: 0;
    background: #111;
    color: #ccc;
    font-family: monospace;
    font-size: 1.4rem;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
</style>
</head>
<body>
<iframe id="frame" src="about:blank" allowfullscreen></iframe>
<div id="error">No URL configured.<br>Visit <strong>/admin</strong> to add one.</div>

<script>
  const frame = document.getElementById("frame");
  const errorEl = document.getElementById("error");

  let urls = [];
  let cycleIndex = 0;
  let cycleTimer = null;
  let pollTimer = null;
  let currentInterval = 30;
  let currentMode = null;

  function showUrl(url) {
    if (!url) {
      frame.style.display = "none";
      errorEl.style.display = "flex";
      return;
    }
    errorEl.style.display = "none";
    frame.style.display = "block";
    if (frame.src !== url) frame.src = url;
  }

  function scheduleCycle() {
    cycleTimer = setTimeout(() => {
      cycleIndex = (cycleIndex + 1) % urls.length;
      showUrl(urls[cycleIndex]);
      scheduleCycle();
    }, currentInterval * 1000);
  }

  function applyConfig(cfg) {
    if (cfg.mode === "single") {
      clearTimeout(cycleTimer);
      cycleTimer = null;
      currentMode = "single";
      showUrl(cfg.active_url ? cfg.active_url.url : null);
      return;
    }

    // cycle mode
    const newUrls = (cfg.urls || []).map(u => u.url);
    const urlsChanged = JSON.stringify(newUrls) !== JSON.stringify(urls);
    const intervalChanged = cfg.interval_secs !== currentInterval;

    urls = newUrls;
    currentInterval = cfg.interval_secs;

    if (urls.length === 0) {
      clearTimeout(cycleTimer);
      cycleTimer = null;
      currentMode = "cycle";
      showUrl(null);
      return;
    }

    // Only restart the cycle if something meaningful changed or we just entered cycle mode
    if (currentMode !== "cycle" || urlsChanged || intervalChanged) {
      clearTimeout(cycleTimer);
      if (urlsChanged) cycleIndex = 0;
      currentMode = "cycle";
      showUrl(urls[cycleIndex]);
      scheduleCycle();
    }
    // Otherwise let the existing timer run uninterrupted
  }

  function poll() {
    fetch("/api/config")
      .then(r => r.json())
      .then(cfg => {
        applyConfig(cfg);
        const delay = Math.min(60, Math.max(10, cfg.interval_secs)) * 1000;
        pollTimer = setTimeout(poll, delay);
      })
      .catch(() => {
        pollTimer = setTimeout(poll, 15000);
      });
  }

  poll();
</script>
</body>
</html>
