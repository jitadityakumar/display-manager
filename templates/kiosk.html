<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }
  #error {
    display: none;
    position: fixed;
    inset: 0;
    background: #111;
    color: #ccc;
    font-family: monospace;
    font-size: 1.4rem;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #menu {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    color: #fff;
    font-family: sans-serif;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    z-index: 10;
  }
  #menu h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #aaa;
    margin-bottom: 1rem;
  }
  .menu-item {
    font-size: 2.6rem;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .menu-item.selected .menu-num {
    background: #fff;
    color: #000;
  }
  .menu-item.selected .menu-label {
    color: #fff;
  }
  .menu-num {
    background: #333;
    color: #fff;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .menu-label {
    color: #eee;
  }
  #menu footer {
    margin-top: 2rem;
    font-size: 1rem;
    color: #555;
  }
  #focus-trap {
    position: fixed;
    inset: 0;
    z-index: 5;
    outline: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<iframe id="frame" src="about:blank" allowfullscreen tabindex="-1"></iframe>
<div id="focus-trap" tabindex="0"></div>
<div id="error">No URL configured.<br>Visit <strong>/admin</strong> to add one.</div>
<div id="menu">
  <h1>Select a display</h1>
  <div id="menu-list"></div>
  <footer>Enter to confirm &nbsp;·&nbsp; Backspace to return</footer>
</div>

<script>
  const frame = document.getElementById("frame");
  const errorEl = document.getElementById("error");
  const menuEl = document.getElementById("menu");
  const menuListEl = document.getElementById("menu-list");
  const focusTrap = document.getElementById("focus-trap");

  // Keep focus on the trap so keydown events never get swallowed by the iframe
  focusTrap.focus();
  focusTrap.addEventListener("blur", () => requestAnimationFrame(() => focusTrap.focus()));

  let allUrls = [];
  let urls = [];
  let cycleIndex = 0;
  let cycleTimer = null;
  let pollTimer = null;
  let currentInterval = 30;
  let currentMode = null;

  // --- numpad state machine ---

  const MENU_MS    = 5 * 60 * 1000;
  const DISPLAY_MS = 15 * 60 * 1000;

  let kioskState    = 'displaying'; // 'displaying' | 'menu'
  let selectedDigit = null;
  let menuTimer     = null;
  let displayTimer  = null;

  function monitorSleep() {
    fetch("/api/monitor", { method: "POST", headers: {"Content-Type": "application/json"}, body: '{"action":"sleep"}' })
      .catch(() => {});
  }

  function openMenu() {
    selectedDigit = null;
    const urlItems = allUrls.map((u, i) =>
      `<div class="menu-item" data-idx="${i}"><span class="menu-num">${i + 1}</span><span class="menu-label">${u.label}</span></div>`
    ).join("");
    const sleepItem = `<div class="menu-item" data-idx="sleep"><span class="menu-num">${allUrls.length + 1}</span><span class="menu-label">Turn screen off</span></div>`;
    menuListEl.innerHTML = urlItems + sleepItem;
    menuEl.style.display = "flex";
    document.body.focus();
    kioskState = 'menu';

    clearTimeout(displayTimer);
    displayTimer = null;
    menuTimer = setTimeout(() => {
      closeMenu();
      monitorSleep();
    }, MENU_MS);
  }

  function closeMenu(restartTimer = true) {
    menuEl.style.display = "none";
    selectedDigit = null;
    kioskState = 'displaying';

    clearTimeout(menuTimer);
    menuTimer = null;
    if (restartTimer) displayTimer = setTimeout(monitorSleep, DISPLAY_MS);
  }

  function highlightDigit(n) {
    selectedDigit = n;
    const sleepIdx = allUrls.length + 1;
    menuListEl.querySelectorAll('.menu-item').forEach((el, i) => {
      el.classList.toggle('selected', n === sleepIdx ? el.dataset.idx === 'sleep' : i === n - 1);
    });
  }

  document.addEventListener('keydown', (e) => {
    // Numpad digits 1-9 (numlock on sends Numpad1..Numpad9)
    const numpadMatch = e.code.match(/^Numpad([1-9])$/);
    const digit = numpadMatch ? parseInt(numpadMatch[1]) : null;

    if (kioskState === 'displaying') {
      if (e.key === 'Backspace') openMenu();
      return;
    }

    // kioskState === 'menu'
    if (digit) {
      highlightDigit(digit);
      return;
    }

    if (e.key === 'Enter') {
      if (selectedDigit === null) return;
      if (selectedDigit === allUrls.length + 1) {
        closeMenu(false);
        monitorSleep();
        return;
      }
      const idx = selectedDigit - 1;
      if (idx < 0 || idx >= allUrls.length) return;
      const url = allUrls[idx];
      fetch("/api/config", {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ mode: "single", active_url_id: url.id }),
      })
        .then(r => r.json())
        .then(applyConfig)
        .catch(() => {});
      closeMenu();
      return;
    }

    if (e.key === 'Backspace') {
      closeMenu();
      return;
    }
  });

  // --- config polling and display ---

  function showUrl(url) {
    if (!url) {
      frame.style.display = "none";
      errorEl.style.display = "flex";
      return;
    }
    errorEl.style.display = "none";
    frame.style.display = "block";
    if (frame.src !== url) frame.src = url;
  }

  function scheduleCycle() {
    cycleTimer = setTimeout(() => {
      cycleIndex = (cycleIndex + 1) % urls.length;
      showUrl(urls[cycleIndex]);
      scheduleCycle();
    }, currentInterval * 1000);
  }

  function applyConfig(cfg) {
    allUrls = cfg.urls || [];

    if (cfg.mode === "single") {
      clearTimeout(cycleTimer);
      cycleTimer = null;
      currentMode = "single";
      showUrl(cfg.active_url ? cfg.active_url.url : null);
      return;
    }

    // cycle mode
    const newUrls = (cfg.urls || []).map(u => u.url);
    const urlsChanged = JSON.stringify(newUrls) !== JSON.stringify(urls);
    const intervalChanged = cfg.interval_secs !== currentInterval;

    urls = newUrls;
    currentInterval = cfg.interval_secs;

    if (urls.length === 0) {
      clearTimeout(cycleTimer);
      cycleTimer = null;
      currentMode = "cycle";
      showUrl(null);
      return;
    }

    // Only restart the cycle if something meaningful changed or we just entered cycle mode
    if (currentMode !== "cycle" || urlsChanged || intervalChanged) {
      clearTimeout(cycleTimer);
      if (urlsChanged) cycleIndex = 0;
      currentMode = "cycle";
      showUrl(urls[cycleIndex]);
      scheduleCycle();
    }
    // Otherwise let the existing timer run uninterrupted
  }

  function poll() {
    fetch("/api/config")
      .then(r => r.json())
      .then(cfg => {
        applyConfig(cfg);
        const delay = Math.min(60, Math.max(10, cfg.interval_secs)) * 1000;
        pollTimer = setTimeout(poll, delay);
      })
      .catch(() => {
        pollTimer = setTimeout(poll, 15000);
      });
  }

  poll();
  displayTimer = setTimeout(monitorSleep, DISPLAY_MS);
</script>
</body>
</html>
